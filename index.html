<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이노업마케팅 | 혁신을 쌓아올리는 브랜드 파트너</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" rel="stylesheet">
    <style>
      #pw-overlay {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        background: #fff;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 99999; font-family: 'Pretendard', sans-serif;
      }
      #pw-overlay h2 { font-size: 22px; margin-bottom: 24px; color: #222; }
      #pw-overlay input {
        padding: 12px 16px; font-size: 16px;
        border: 1px solid #ccc; border-radius: 8px;
        width: 260px; margin-bottom: 12px; text-align: center;
      }
      #pw-overlay button {
        padding: 12px 32px; font-size: 16px;
        background: #1a1a2e; color: #fff;
        border: none; border-radius: 8px; cursor: pointer; width: 260px;
      }
      #pw-overlay .error { color: red; font-size: 14px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <div id="pw-overlay">
      <h2>🔒 비밀번호를 입력하세요</h2>
      <input type="password" id="pw-input" placeholder="비밀번호" onkeydown="if(event.key==='Enter')checkPw()" />
      <button onclick="checkPw()">확인</button>
      <p class="error" id="pw-error"></p>
    </div>
    <div id="root"></div>
    <script>
      (function() {
        if (sessionStorage.getItem('auth') === 'ok') {
          document.getElementById('pw-overlay').style.display = 'none';
        }
      })();
      function checkPw() {
        var pw = document.getElementById('pw-input').value;
        if (pw === 'innoup3334') {
          sessionStorage.setItem('auth', 'ok');
          document.getElementById('pw-overlay').style.display = 'none';
        } else {
          document.getElementById('pw-error').textContent = '비밀번호가 틀렸습니다.';
        }
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
